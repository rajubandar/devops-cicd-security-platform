# =============================================================================
# SonarQube Project Configuration
# DevOps CI/CD Security Platform
# =============================================================================

# Project identification
sonar.projectKey=devops-cicd-security-platform
sonar.projectName=DevOps CI/CD Security Platform
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/*.test.*,**/vendor/**,reports/**,artifacts/**

# Language settings
sonar.sourceEncoding=UTF-8

# Report paths
sonar.python.coverage.reportPaths=reports/coverage.xml
sonar.python.xunit.reportPath=reports/test-results.xml

# SonarQube server (set via environment variables)
# sonar.host.url=${SONAR_HOST_URL}
# sonar.login=${SONAR_TOKEN}

# Quality Gate
sonar.qualitygate.wait=true

# Scanner settings
sonar.scm.provider=git
sonar.scm.disabled=false

# Shell script analysis
sonar.sh.file.suffixes=.sh,.bash

# YAML files
sonar.yaml.file.suffixes=.yaml,.yml

# Duplications
sonar.cpd.exclusions=**/*test*/**
