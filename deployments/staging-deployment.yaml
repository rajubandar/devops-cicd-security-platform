apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-staging
  namespace: staging
  labels:
    app: devops-app
    version: v1.2.3
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: devops-app
          image: myregistry/devops-app:v1.2.3
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
