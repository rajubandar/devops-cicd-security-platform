pipeline:
  name: devops-cicd-pipeline
  version: "1.0"
  stages:
    - name: checkout
      description: Source code checkout from GitHub
    - name: build
      description: Build application and Docker image
    - name: test
      description: Unit and integration tests
    - name: security_scan
      description: SonarQube and OPA policy validation
    - name: deploy
      description: Deployment to target environment
  triggers:
    - branch: development
      event: push
      pipeline: ci-cd-pipeline
    - branch: production
      event: push
      pipeline: production-deploy
  artifacts:
    directory: artifacts/
    retention_days: 30
  notifications:
    on_failure:
      - rollback: true
      - alert: team-channel
    on_success:
      - deploy: true
