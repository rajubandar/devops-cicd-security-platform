# =============================================================
# Security Configuration - DevOps CI/CD Platform
# =============================================================

# Execution Security
ALLOW_ROOT_EXEC=false
ENFORCE_NON_ROOT_USER=true
MIN_UID=1000

# Container Security
PRIVILEGED_CONTAINERS=false
ALLOW_PRIVILEGE_ESCALATION=false
READ_ONLY_ROOT_FS=true
DROP_ALL_CAPABILITIES=true

# Image Security
ENFORCE_IMAGE_TAGS=true
ALLOW_LATEST_TAG=false
REQUIRED_IMAGE_TAG_FORMAT=semver

# Pipeline Security
SECURITY_SCAN_ENABLED=true
QUALITY_GATE_ENFORCE=true
OPA_POLICY_ENFORCE=true
FAIL_ON_HIGH_VULNERABILITY=true

# SonarQube Thresholds
MAX_BUGS=0
MAX_VULNERABILITIES=0
MAX_CODE_SMELLS=10
MAX_DUPLICATION_PERCENT=3
