# =============================================================================
# Security Configuration File
# DevOps CI/CD Security Platform
# =============================================================================

[general]
# Prevent root user execution in containers
allow_root_execution=false

# Require explicit version tags on container images (no 'latest')
require_image_tags=true

# Disallow privileged container execution
allow_privileged_containers=false

# Minimum number of replicas for HA
minimum_replicas=2

# Require readiness and liveness probes
require_health_probes=true

[network]
# Disallow host network access
allow_host_network=false

# Disallow host PID namespace sharing
allow_host_pid=false

# Disallow host IPC namespace sharing
allow_host_ipc=false

# Require network policies
require_network_policy=true

[secrets]
# Enable secret scanning in CI/CD
scan_for_secrets=true

# Fail pipeline on secret detection
fail_on_secret_detection=true

# Disallow hardcoded credentials
allow_hardcoded_secrets=false

[images]
# Require images from approved registries
approved_registries=myregistry.azurecr.io,gcr.io,public.ecr.aws

# Require image scanning before deployment
require_image_scan=true

# Fail on HIGH/CRITICAL vulnerabilities
fail_on_vulnerability_severity=HIGH

[compliance]
# Enforce OPA policies
enforce_opa_policies=true

# SonarQube quality gate must pass
sonarqube_quality_gate=true

# Require signed commits
require_signed_commits=false

[audit]
# Enable audit logging
enable_audit_log=true

# Log path
audit_log_path=/var/log/devops-platform/audit.log

# Log retention in days
log_retention_days=90
