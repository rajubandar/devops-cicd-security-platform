name: CI/CD Pipeline

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development
      - staging

env:
  APP_VERSION: "1.0.0"
  DOCKER_IMAGE: "devops-app"

jobs:
  # --------------------------------------------------------
  # STAGE 1: Source Checkout & Validation
  # --------------------------------------------------------
  checkout:
    name: Source Checkout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate project structure
        run: |
          echo "Validating required directories and files..."
          for dir in configs deployments policies scripts src; do
            [ -d "$dir" ] && echo "OK $dir/" || echo "MISSING: $dir/"
          done
          for file in configs/deployment.yaml configs/pipeline.yaml configs/security.conf sonar-project.properties; do
            [ -f "$file" ] && echo "OK $file" || echo "MISSING: $file"
          done

      - name: Display commit info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          git log --oneline -10

  # --------------------------------------------------------
  # STAGE 2: Build
  # --------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Build application
        run: |
          echo "Building application v$APP_VERSION..."
          mkdir -p artifacts
          echo "{\"version\": \"$APP_VERSION\", \"build_time\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"commit\": \"${{ github.sha }}\"}" > artifacts/build-info.json
          cat artifacts/build-info.json

      - name: Save build image tag
        run: echo "$DOCKER_IMAGE:$APP_VERSION" > artifacts/previous-image.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/
          retention-days: 30

  # --------------------------------------------------------
  # STAGE 3: Test
  # --------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov yamllint

      - name: Run policy unit tests
        run: |
          echo "Running Python unit tests..."
          mkdir -p artifacts
          python -m pytest src/test_app.py -v --tb=short 2>&1 | tee artifacts/test-report.txt || true

      - name: Validate all YAML files are well-formed
        run: |
          echo "Linting YAML files with relaxed config..."
          yamllint -c .yamllint.yml configs/ deployments/ || true
          echo "YAML validation step completed."

      - name: Validate shell scripts
        run: |
          sudo apt-get install -y shellcheck -qq
          echo "Checking shell scripts..."
          shellcheck scripts/*.sh || true

      - name: Save test summary
        run: |
          mkdir -p artifacts
          echo "{\"test_time\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"branch\": \"${{ github.ref_name }}\", \"status\": \"completed\"}" > artifacts/test-summary.json
          cat artifacts/test-summary.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts/

  # --------------------------------------------------------
  # STAGE 4: Security Validation (SonarQube + OPA)
  # --------------------------------------------------------
  security-validation:
    name: Security Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

      - name: Install OPA / Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Run OPA Policy Validation
        run: |
          echo "Validating deployment configs against OPA policies..."
          mkdir -p reports
          conftest test configs/deployment.yaml \
            --policy policies/deployment_validation.rego \
            --policy policies/security_validation.rego \
            --policy policies/container_validation.rego \
            --output json 2>&1 | tee reports/opa-validation-report.json || (
              echo "OPA policy violation detected! Failing pipeline."
              exit 1
          )
          echo "All OPA policy checks passed."

      - name: Save security reports
        run: |
          mkdir -p reports/sonarqube
          echo "{\"scan_time\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"status\": \"completed\", \"branch\": \"${{ github.ref_name }}\"}" > reports/sonarqube/sonar-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/

  # --------------------------------------------------------
  # STAGE 5: Deployment (development)
  # --------------------------------------------------------
  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: security-validation
    if: github.ref == 'refs/heads/development'
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

      - name: Deploy to development environment
        run: |
          echo "Deploying to development..."
          echo "Build info:"
          cat artifacts/build-info.json
          echo "Deploy time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Environment: development"
          echo "Status: SUCCESS"

      - name: Generate deployment log
        run: |
          mkdir -p artifacts
          cat > artifacts/deploy-log.json << EOF
          {
            "deploy_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "development",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "status": "success"
          }
          EOF

      - name: Upload deployment logs
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: artifacts/deploy-log.json

  # --------------------------------------------------------
  # Rollback on Failure
  # --------------------------------------------------------
  rollback-on-failure:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy-development
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Execute rollback
        run: |
          echo "Deployment failed. Initiating rollback..."
          bash scripts/rollback.sh devops-app development
