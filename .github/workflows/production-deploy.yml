name: Production Deploy

on:
  push:
    branches:
      - production

env:
  APP_VERSION: "1.0.0"

jobs:
  # --------------------------------------------------------
  # Full validation before production deploy
  # --------------------------------------------------------
  pre-deploy-validation:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate all required files
        run: |
          echo "Validating production readiness..."
          MISSING=0
          for f in configs/deployment.yaml configs/security.conf policies/deployment_validation.rego policies/security_validation.rego policies/container_validation.rego sonar-project.properties; do
            [ -f "$f" ] && echo "✓ $f" || { echo "✗ MISSING: $f"; MISSING=1; }
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: OPA Policy Gate
        run: |
          echo "Running full OPA policy check before production deploy..."
          conftest test configs/deployment.yaml \
            --policy policies/deployment_validation.rego \
            --policy policies/security_validation.rego \
            --policy policies/container_validation.rego \
            --output json 2>&1 | tee reports/prod-opa-report.json || (
              echo "PRODUCTION BLOCKED: OPA policy violations found!"
              exit 1
          )

  # --------------------------------------------------------
  # Production Deployment
  # --------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deploy-validation
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to PRODUCTION..."
          echo "Commit: ${{ github.sha }}"
          echo "Time:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Version: $APP_VERSION"
          echo "Status: SUCCESS"

      - name: Generate production deployment report
        run: |
          mkdir -p artifacts reports
          cat > artifacts/prod-deploy-log.json << EOF
          {
            "deploy_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "production",
            "commit": "${{ github.sha }}",
            "version": "$APP_VERSION",
            "status": "success"
          }
          EOF

      - name: Upload production logs
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-logs
          path: |
            artifacts/prod-deploy-log.json
            reports/

  # --------------------------------------------------------
  # Rollback on Production Failure
  # --------------------------------------------------------
  production-rollback:
    name: Production Rollback
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Execute production rollback
        run: |
          echo "CRITICAL: Production deployment failed! Rolling back..."
          bash scripts/rollback.sh devops-app production
